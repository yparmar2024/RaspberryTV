<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RaspberryTV</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <style>
    :root {
      --bg:        #080810;
      --surface:   #10101a;
      --card:      #171724;
      --card-h:    #1e1e2e;
      --border:    #252538;
      --accent:    #e8003d;
      --accent-h:  #ff1a52;
      --gold:      #f5c842;
      --text:      #eeeef8;
      --muted:     #7777aa;
      --focus:     0 0 0 3px rgba(232,0,61,0.6);
      --r:         10px;
      --font-head: 'Bebas Neue', sans-serif;
      --font-body: 'DM Sans', sans-serif;
      --ease:      cubic-bezier(0.4,0,0.2,1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-body); font-size: 18px; overflow-x: hidden; }
    :focus-visible { outline: none; box-shadow: var(--focus); border-radius: var(--r); }
    button { cursor: pointer; border: none; background: none; font-family: inherit; color: inherit; }
    img { display: block; }

    /* ── Layout ── */
    #app { display: flex; flex-direction: column; min-height: 100vh; }

    /* ── Header ── */
    header {
      display: flex; align-items: center; gap: 2rem;
      padding: 1.2rem 3rem;
      background: linear-gradient(to bottom, rgba(8,8,16,0.98), transparent);
      position: sticky; top: 0; z-index: 100;
    }
    .logo { font-family: var(--font-head); font-size: 2.2rem; letter-spacing: 0.06em; white-space: nowrap; }
    .logo span { color: var(--accent); }

    .search-wrap { display: flex; align-items: center; gap: 0.75rem; flex: 1; max-width: 680px; }
    .search-inner {
      display: flex; align-items: center; flex: 1;
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: 50px; overflow: hidden;
      transition: border-color 0.15s var(--ease), box-shadow 0.15s var(--ease);
    }
    .search-inner:focus-within { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(232,0,61,0.15); }
    #searchInput {
      flex: 1; background: none; border: none; outline: none;
      color: var(--text); font-family: var(--font-body); font-size: 1.05rem;
      padding: 0.8rem 1.4rem;
    }
    #searchInput::placeholder { color: var(--muted); }
    .search-icon { padding: 0 1.1rem 0 0; color: var(--muted); pointer-events: none; }

    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 0.4rem;
      padding: 0.75rem 1.8rem; border-radius: 50px;
      font-family: var(--font-body); font-size: 1rem; font-weight: 600;
      transition: background 0.15s, transform 0.1s;
    }
    .btn-red  { background: var(--accent); color: #fff; }
    .btn-red:hover, .btn-red:focus-visible { background: var(--accent-h); transform: scale(1.03); }
    .btn-ghost { background: var(--surface); color: var(--text); border: 1.5px solid var(--border); }
    .btn-ghost:hover, .btn-ghost:focus-visible { border-color: var(--accent); color: var(--accent); }
    .btn-sm { padding: 0.5rem 1.1rem; font-size: 0.88rem; }

    /* ── Keyboard button ── */
    #kbdBtn {
      display: inline-flex; align-items: center; justify-content: center;
      width: 44px; height: 44px; border-radius: 50%;
      background: var(--surface); border: 1.5px solid var(--border);
      color: var(--muted); font-size: 1.1rem; flex-shrink: 0;
      transition: all 0.15s; cursor: pointer;
    }
    #kbdBtn:hover { border-color: var(--accent); color: var(--accent); }
    #kbdBtn.active { background: rgba(232,0,61,0.15); border-color: var(--accent); color: var(--accent); }

    /* Filter tabs */
    .tabs { display: flex; gap: 0.5rem; padding: 0.5rem 3rem 0; }
    .tab {
      padding: 0.4rem 1.1rem; border-radius: 50px; font-size: 0.88rem; font-weight: 500;
      color: var(--muted); background: var(--surface); border: 1.5px solid transparent;
      transition: all 0.15s;
    }
    .tab.active, .tab:hover, .tab:focus-visible { color: var(--accent); border-color: var(--accent); background: rgba(232,0,61,0.1); }

    /* ── Main ── */
    main { flex: 1; padding: 1.75rem 3rem 5rem; }
    .section-label { font-family: var(--font-head); font-size: 1.7rem; letter-spacing: 0.05em; color: var(--muted); margin-bottom: 1.2rem; }
    .section-label span { color: var(--text); }

    /* ── Grid ── */
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 1.1rem; }
    .card {
      background: var(--card); border-radius: var(--r); border: 2px solid transparent;
      overflow: hidden; cursor: pointer; outline: none;
      transition: border-color 0.15s var(--ease), transform 0.15s var(--ease), box-shadow 0.15s var(--ease);
    }
    .card:hover, .card:focus-visible {
      border-color: var(--accent); transform: scale(1.04) translateY(-3px);
      box-shadow: 0 10px 36px rgba(232,0,61,0.22); z-index: 2;
    }
    .card.focused { border-color: var(--accent); transform: scale(1.04) translateY(-3px); box-shadow: 0 10px 36px rgba(232,0,61,0.22); z-index: 2; }
    .poster { width: 100%; aspect-ratio: 2/3; object-fit: cover; background: var(--surface); }
    .poster-ph {
      width: 100%; aspect-ratio: 2/3;
      background: linear-gradient(135deg, var(--surface), var(--card-h));
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 0.4rem; color: var(--muted); font-size: 2.2rem;
    }
    .poster-ph small { font-size: 0.65rem; text-align: center; padding: 0 0.5rem; line-height: 1.3; }
    .card-body { padding: 0.65rem; }
    .card-title { font-weight: 600; font-size: 0.85rem; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .card-meta { display: flex; align-items: center; gap: 0.4rem; margin-top: 0.3rem; font-size: 0.72rem; color: var(--muted); }
    .badge { font-size: 0.6rem; font-weight: 700; text-transform: uppercase; padding: 0.12rem 0.4rem; border-radius: 3px; letter-spacing: 0.06em; }
    .badge-movie { background: rgba(232,0,61,0.18); color: var(--accent); }
    .badge-tv    { background: rgba(100,120,255,0.18); color: #8899ff; }
    .star { color: var(--gold); }

    /* ── Spinner / Empty ── */
    .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 3rem auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty { text-align: center; padding: 4rem 2rem; color: var(--muted); grid-column: 1/-1; }
    .empty .icon { font-size: 3rem; margin-bottom: 1rem; }
    .empty h2 { font-family: var(--font-head); font-size: 1.8rem; color: var(--text); margin-bottom: 0.4rem; }

    /* ── Detail panel ── */
    #detailPanel {
      display: none; position: fixed; inset: 0; z-index: 200;
      background: rgba(4,4,10,0.94); backdrop-filter: blur(10px);
      overflow-y: auto; animation: fadeIn 0.2s ease;
    }
    #detailPanel.open { display: block; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .detail-bg { position: absolute; inset: 0; height: 56vh; overflow: hidden; pointer-events: none; }
    .detail-bg img { width: 100%; height: 100%; object-fit: cover; opacity: 0.15; filter: blur(3px) saturate(1.3); }
    .detail-bg-fade { position: absolute; inset: 0; background: linear-gradient(to bottom, transparent 25%, rgba(4,4,10,0.96) 75%, #04040a 100%); }

    .detail-inner { position: relative; max-width: 1080px; margin: 0 auto; padding: 3rem 3rem 5rem; }
    .detail-close {
      position: absolute; top: 1.5rem; right: 2rem;
      width: 44px; height: 44px; border-radius: 50%;
      background: var(--surface); border: 1.5px solid var(--border);
      font-size: 1.2rem; color: var(--muted);
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s; z-index: 10;
    }
    .detail-close:hover, .detail-close:focus-visible { border-color: var(--accent); color: var(--text); }

    .detail-hero { display: flex; gap: 2.5rem; align-items: flex-start; margin-bottom: 2rem; }
    .detail-poster-wrap { width: 200px; flex-shrink: 0; border-radius: var(--r); overflow: hidden; box-shadow: 0 14px 50px rgba(0,0,0,0.7); }
    .detail-poster-wrap img { width: 100%; display: block; }
    .detail-poster-ph { width: 200px; aspect-ratio: 2/3; background: var(--surface); display: flex; align-items: center; justify-content: center; font-size: 3.5rem; color: var(--muted); border-radius: var(--r); }

    .detail-info { flex: 1; padding-top: 0.75rem; }
    .detail-badges { display: flex; gap: 0.5rem; margin-bottom: 0.6rem; flex-wrap: wrap; }
    .detail-title { font-family: var(--font-head); font-size: 3rem; letter-spacing: 0.03em; line-height: 1.05; margin-bottom: 0.3rem; }
    .detail-tagline { font-size: 0.95rem; color: var(--muted); font-style: italic; margin-bottom: 0.9rem; }
    .detail-stats { display: flex; flex-wrap: wrap; gap: 1.4rem; margin-bottom: 1rem; font-size: 0.9rem; }
    .stat-label { color: var(--muted); font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.08em; }
    .stat-value { font-weight: 600; }
    .genres { display: flex; flex-wrap: wrap; gap: 0.35rem; margin-bottom: 1rem; }
    .genre-pill { padding: 0.25rem 0.8rem; border-radius: 50px; font-size: 0.75rem; background: var(--card); border: 1px solid var(--border); color: var(--muted); }
    .detail-overview { font-size: 0.95rem; color: #ccc; line-height: 1.65; margin-bottom: 1.4rem; max-width: 680px; }
    .detail-actions { display: flex; gap: 0.75rem; flex-wrap: wrap; }

    /* Episode picker */
    #episodePicker { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 1.4rem; margin-top: 1.4rem; }
    .picker-row { display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; margin-bottom: 1rem; }
    .picker-row label { font-weight: 600; font-size: 0.85rem; color: var(--muted); min-width: 70px; }
    select { background: var(--card); border: 1.5px solid var(--border); border-radius: 8px; color: var(--text); font-family: var(--font-body); font-size: 0.95rem; padding: 0.5rem 0.9rem; cursor: pointer; outline: none; min-width: 160px; }
    select:focus { border-color: var(--accent); }

    .ep-list { display: flex; flex-direction: column; gap: 0.5rem; max-height: 300px; overflow-y: auto; }
    .ep-item { display: flex; align-items: center; gap: 0.9rem; padding: 0.7rem; border-radius: 8px; background: var(--card); border: 1.5px solid transparent; cursor: pointer; transition: all 0.15s; outline: none; }
    .ep-item:hover, .ep-item:focus-visible, .ep-item.focused { border-color: var(--accent); background: var(--card-h); }
    .ep-num { font-family: var(--font-head); font-size: 1.2rem; color: var(--muted); min-width: 32px; }
    .ep-info { flex: 1; }
    .ep-name { font-weight: 600; font-size: 0.85rem; }
    .ep-date { font-size: 0.7rem; color: var(--muted); }
    .ep-still { width: 90px; aspect-ratio: 16/9; border-radius: 5px; object-fit: cover; background: var(--surface); flex-shrink: 0; }

    /* Cast */
    .cast-strip { display: flex; gap: 0.9rem; overflow-x: auto; padding-bottom: 0.4rem; margin-top: 1.4rem; }
    .cast-strip::-webkit-scrollbar { height: 3px; }
    .cast-strip::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .cast-card { flex-shrink: 0; width: 88px; text-align: center; }
    .cast-photo { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; background: var(--card); margin: 0 auto 0.35rem; border: 2px solid var(--border); }
    .cast-name { font-size: 0.7rem; font-weight: 600; }
    .cast-char { font-size: 0.62rem; color: var(--muted); }

    /* ── Player ── */
    #playerPanel { display: none; position: fixed; inset: 0; z-index: 300; background: #000; flex-direction: column; }
    #playerPanel.open { display: flex; }
    .player-bar { display: flex; align-items: center; gap: 1rem; padding: 0.7rem 1.4rem; background: rgba(0,0,0,0.88); flex-shrink: 0; z-index: 10; }
    .player-title { flex: 1; font-family: var(--font-head); font-size: 1.3rem; letter-spacing: 0.04em; }
    .player-ep-nav { display: flex; align-items: center; gap: 0.6rem; }
    .player-ep-nav select { min-width: 100px; padding: 0.35rem 0.7rem; font-size: 0.8rem; }
    .frame-wrap { flex: 1; position: relative; overflow: hidden; }
    #vidFrame { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: 2rem; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text); padding: 0.65rem 1.4rem; border-radius: 50px;
      font-size: 0.85rem; z-index: 500; pointer-events: none;
      transition: transform 0.25s var(--ease);
    }
    #toast.show { transform: translateX(-50%) translateY(0); }

    /* ── Key hint bar ── */
    .hint-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(8,8,16,0.92); border-top: 1px solid var(--border);
      display: flex; justify-content: center; gap: 2rem;
      padding: 0.45rem 2rem; font-size: 0.72rem; color: var(--muted); z-index: 50;
    }
    .hint-bar kbd { background: var(--card); border: 1px solid var(--border); border-radius: 3px; padding: 0.08rem 0.4rem; font-size: 0.68rem; color: var(--text); margin-right: 0.2rem; }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    @media (max-width: 860px) {
      header { padding: 1rem 1.5rem; }
      main { padding: 1.5rem 1.5rem 5rem; }
      .tabs { padding: 0.5rem 1.5rem 0; }
      .detail-inner { padding: 2rem 1.5rem 4rem; }
      .detail-hero { flex-direction: column; }
      .detail-poster-wrap { width: 150px; }
      .detail-title { font-size: 2.2rem; }
    }
  </style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo">Raspberry<span>TV</span></div>
    <div class="search-wrap">
      <div class="search-inner">
        <input id="searchInput" type="text" placeholder="Search movies & TV shows…" autocomplete="off" spellcheck="false" />
        <span class="search-icon">🔍</span>
      </div>
      <!-- On-screen keyboard toggle — calls /api/keyboard on the Pi -->
      <button id="kbdBtn" title="Toggle on-screen keyboard">⌨</button>
      <button id="searchBtn" class="btn btn-red">Search</button>
    </div>
  </header>

  <div class="tabs" id="tabs">
    <button class="tab active" data-type="multi">All</button>
    <button class="tab" data-type="movie">Movies</button>
    <button class="tab" data-type="tv">TV Shows</button>
  </div>

  <main>
    <div id="trendingSection">
      <div class="section-label">🔥 <span>Trending This Week</span></div>
      <div class="grid" id="trendingGrid"></div>
    </div>
    <div id="resultsSection" style="display:none">
      <div class="section-label" id="resultsLabel"></div>
      <div class="grid" id="resultsGrid"></div>
    </div>
  </main>

  <div class="hint-bar">
    <span><kbd>↑↓←→</kbd> Navigate</span>
    <span><kbd>Enter</kbd> Select</span>
    <span><kbd>Esc</kbd> Back</span>
    <span><kbd>H</kbd> Home</span>
    <span><kbd>⌨</kbd> Keyboard</span>
  </div>
</div>

<!-- Detail Panel -->
<div id="detailPanel">
  <div class="detail-bg"><img id="detailBg" src="" alt="" /><div class="detail-bg-fade"></div></div>
  <div class="detail-inner" id="detailInner"></div>
</div>

<!-- Player Panel -->
<div id="playerPanel">
  <div class="player-bar">
    <button class="btn btn-ghost btn-sm" id="playerBack">← Back</button>
    <div class="player-title" id="playerTitle"></div>
    <div class="player-ep-nav" id="playerEpNav" style="display:none">
      <select id="playerSeason"></select>
      <select id="playerEp"></select>
      <button class="btn btn-ghost btn-sm" id="playerLoad">▶ Load</button>
    </div>
  </div>
  <div class="frame-wrap">
    <iframe id="vidFrame" src="about:blank" allowfullscreen allow="autoplay;fullscreen;encrypted-media" referrerpolicy="no-referrer" sandbox="allow-scripts allow-same-origin allow-forms allow-pointer-lock allow-popups-to-escape-sandbox"></iframe>
  </div>
</div>

<div id="toast"></div>

<script>
// ── State ────────────────────────────────────────────────────────────────────
const S = {
  filter: "multi",
  detail: null,
  playerActive: false,
  playerSrc: "",
  focusedCard: null,
};

// ── WebSocket (remote control) ───────────────────────────────────────────────
const socket = io();
socket.on("command", handleRemoteCommand);

function modalMove(cmd) {
  const focusables = Array.from(detailPanel.querySelectorAll("button, [tabindex='0'], select"))
    .filter(el => el.offsetParent !== null);
  if (!focusables.length) return;
  let idx = focusables.indexOf(document.activeElement);
  if (idx < 0) idx = 0;
  if (cmd === "up" || cmd === "left") {
    idx = (idx - 1 + focusables.length) % focusables.length;
  } else if (cmd === "down" || cmd === "right") {
    idx = (idx + 1) % focusables.length;
  }
  focusables[idx].focus();
}

function handleRemoteCommand({ cmd, query }) {
  if (S.playerActive) {
    if (cmd === "back") closePlayer();
    return;
  }
  if (document.getElementById("detailPanel").classList.contains("open")) {
    if (cmd === "back") closeDetail();
    else if (["up", "down", "left", "right"].includes(cmd)) modalMove(cmd);
    else if (cmd === "enter" && document.activeElement) document.activeElement.click();
    return;
  }
  switch (cmd) {
    case "up":    gridMove(-1, "row"); break;
    case "down":  gridMove(1, "row");  break;
    case "left":  gridMove(-1, "col"); break;
    case "right": gridMove(1, "col");  break;
    case "enter": activateFocused();   break;
    case "back":  focusSearch();       break;
    case "home":  goHome();            break;
    case "search":
      if (query) { document.getElementById("searchInput").value = query; doSearch(); }
      break;
  }
}

// ── DOM refs ─────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const searchInput     = $("searchInput");
const searchBtn       = $("searchBtn");
const trendingGrid    = $("trendingGrid");
const trendingSection = $("trendingSection");
const resultsSection  = $("resultsSection");
const resultsGrid     = $("resultsGrid");
const resultsLabel    = $("resultsLabel");
const detailPanel     = $("detailPanel");
const detailInner     = $("detailInner");
const playerPanel     = $("playerPanel");
const playerBack      = $("playerBack");
const playerTitle     = $("playerTitle");
const vidFrame        = $("vidFrame");
const playerEpNav     = $("playerEpNav");
const playerSeason    = $("playerSeason");
const playerEp        = $("playerEp");
const playerLoad      = $("playerLoad");

// ── Toast ────────────────────────────────────────────────────────────────────
let toastTimer;
function toast(msg, dur = 2600) {
  const el = $("toast");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove("show"), dur);
}

// ── Helpers ──────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
function fmtRuntime(m) {
  if (!m) return "";
  return m >= 60 ? `${Math.floor(m/60)}h ${m%60}m` : `${m}m`;
}

// ── On-screen keyboard ───────────────────────────────────────────────────────
// Toggles matchbox-keyboard on the Pi via the Flask /api/keyboard endpoint.
// The ⌨ button lights up red when the keyboard is open.
let kbdOpen = false;
const kbdBtn = $("kbdBtn");

kbdBtn.addEventListener("click", toggleKeyboard);

// Auto-open when the search input is clicked/focused with a mouse
searchInput.addEventListener("pointerdown", () => {
  if (!kbdOpen) toggleKeyboard();
});

// Auto-close when search input loses focus (user clicked elsewhere)
searchInput.addEventListener("blur", () => {
  if (kbdOpen) {
    // Small delay so clicking the keyboard itself doesn't close it
    setTimeout(() => {
      if (document.activeElement !== searchInput) toggleKeyboard();
    }, 200);
  }
});

async function toggleKeyboard() {
  kbdOpen = !kbdOpen;
  kbdBtn.classList.toggle("active", kbdOpen);
  try {
    await fetch("/api/keyboard", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ action: kbdOpen ? "show" : "hide" })
    });
  } catch (e) {
    console.warn("Keyboard toggle failed:", e);
  }
}

// ── Card builder ─────────────────────────────────────────────────────────────
function buildCard(item) {
  const card = document.createElement("div");
  card.className = "card";
  card.tabIndex = 0;
  card.dataset.id   = item.tmdbId;
  card.dataset.type = item.type;
  card.setAttribute("role", "button");
  card.setAttribute("aria-label", `${item.title}`);

  const posterHTML = item.poster
    ? `<img class="poster" src="${item.poster}" alt="${esc(item.title)}" loading="lazy" />`
    : `<div class="poster-ph">🎬<small>${esc(item.title)}</small></div>`;

  card.innerHTML = `${posterHTML}
    <div class="card-body">
      <div class="card-title">${esc(item.title)}</div>
      <div class="card-meta">
        <span class="badge badge-${item.type}">${item.type === "movie" ? "MOVIE" : "TV"}</span>
        ${item.year ? `<span>${item.year}</span>` : ""}
        ${item.rating > 0 ? `<span class="star">★</span><span>${item.rating}</span>` : ""}
      </div>
    </div>`;

  card.addEventListener("click", () => openDetail(item.tmdbId, item.type));
  card.addEventListener("keydown", e => { if (e.key === "Enter") openDetail(item.tmdbId, item.type); });
  card.addEventListener("focus", () => { S.focusedCard = card; });
  return card;
}

function renderGrid(el, items) {
  el.innerHTML = "";
  if (!items.length) {
    el.innerHTML = `<div class="empty"><div class="icon">🎬</div><h2>No results</h2></div>`;
    return;
  }
  items.forEach(i => el.appendChild(buildCard(i)));
}

// ── Trending ─────────────────────────────────────────────────────────────────
async function loadTrending() {
  trendingGrid.innerHTML = `<div class="spinner" style="grid-column:1/-1"></div>`;
  try {
    const r = await fetch("/api/trending?type=all&window=week");
    const d = await r.json();
    renderGrid(trendingGrid, d.results || []);
  } catch {
    trendingGrid.innerHTML = `<div class="empty" style="grid-column:1/-1"><div class="icon">⚠️</div><h2>Could not load</h2></div>`;
  }
}

// ── Go Home ───────────────────────────────────────────────────────────────────
function goHome() {
  if (S.playerActive) closePlayer();
  if (detailPanel.classList.contains("open")) closeDetail();
  searchInput.value = "";
  resultsSection.style.display = "none";
  trendingSection.style.display = "block";
  loadTrending();
  setTimeout(() => { const c = trendingGrid.querySelector(".card"); if (c) c.focus(); }, 700);
}

// ── Search ────────────────────────────────────────────────────────────────────
async function doSearch() {
  const q = searchInput.value.trim();
  if (!q) return;
  // Close keyboard after submitting search
  if (kbdOpen) toggleKeyboard();
  trendingSection.style.display = "none";
  resultsSection.style.display = "block";
  resultsLabel.innerHTML = `Searching…`;
  resultsGrid.innerHTML = `<div class="spinner" style="grid-column:1/-1"></div>`;
  try {
    const r = await fetch(`/api/search?q=${encodeURIComponent(q)}&type=${S.filter}`);
    const d = await r.json();
    const items = d.results || [];
    resultsLabel.innerHTML = `<span>${items.length} result${items.length !== 1 ? "s" : ""}</span> for "${esc(q)}"`;
    renderGrid(resultsGrid, items);
    const first = resultsGrid.querySelector(".card");
    if (first) first.focus();
  } catch {
    resultsGrid.innerHTML = `<div class="empty" style="grid-column:1/-1"><div class="icon">⚠️</div><h2>Search failed</h2></div>`;
  }
}

searchBtn.addEventListener("click", doSearch);
searchInput.addEventListener("keydown", e => { if (e.key === "Enter") doSearch(); });

$("tabs").addEventListener("click", e => {
  const btn = e.target.closest(".tab");
  if (!btn) return;
  document.querySelectorAll(".tab").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  S.filter = btn.dataset.type;
  if (resultsSection.style.display !== "none") doSearch();
});

// ── Detail Panel ──────────────────────────────────────────────────────────────
async function openDetail(tmdbId, type) {
  detailInner.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:60vh"><div class="spinner"></div></div>`;
  detailPanel.classList.add("open");
  document.body.style.overflow = "hidden";
  try {
    const r = await fetch(`/api/details/${type}/${tmdbId}`);
    const d = await r.json();
    if (d.error) { toast("Could not load details."); closeDetail(); return; }
    S.detail = d;
    renderDetail(d);
  } catch {
    toast("Network error.");
    closeDetail();
  }
}

function renderDetail(d) {
  const isTV = d.type === "tv";
  if (d.backdrop) $("detailBg").src = d.backdrop;

  const stats = [];
  if (d.rating > 0)         stats.push(`<div><div class="stat-label">Rating</div><div class="stat-value"><span class="star">★</span> ${d.rating}/10</div></div>`);
  if (d.release_date)       stats.push(`<div><div class="stat-label">Released</div><div class="stat-value">${d.release_date}</div></div>`);
  if (d.first_air_date)     stats.push(`<div><div class="stat-label">Premiered</div><div class="stat-value">${d.first_air_date}</div></div>`);
  if (d.runtime)            stats.push(`<div><div class="stat-label">Runtime</div><div class="stat-value">${fmtRuntime(d.runtime)}</div></div>`);
  if (d.number_of_seasons)  stats.push(`<div><div class="stat-label">Seasons</div><div class="stat-value">${d.number_of_seasons}</div></div>`);
  if (d.number_of_episodes) stats.push(`<div><div class="stat-label">Episodes</div><div class="stat-value">${d.number_of_episodes}</div></div>`);

  detailInner.innerHTML = `
    <button class="detail-close" id="detailClose">✕</button>
    <div class="detail-hero">
      <div id="dPosterWrap">${d.poster
        ? `<div class="detail-poster-wrap"><img src="${d.poster}" alt="${esc(d.title)}" /></div>`
        : `<div class="detail-poster-ph">🎬</div>`}</div>
      <div class="detail-info">
        <div class="detail-badges">
          <span class="badge badge-${d.type}">${isTV ? "TV SHOW" : "MOVIE"}</span>
          ${d.status ? `<span class="badge" style="background:rgba(255,255,255,0.07);color:var(--muted)">${d.status}</span>` : ""}
        </div>
        <h1 class="detail-title">${esc(d.title)}</h1>
        ${d.tagline ? `<p class="detail-tagline">${esc(d.tagline)}</p>` : ""}
        <div class="detail-stats">${stats.join("")}</div>
        <div class="genres">${(d.genres||[]).map(g=>`<span class="genre-pill">${g}</span>`).join("")}</div>
        <p class="detail-overview">${esc(d.overview)}</p>
        <div class="detail-actions" id="dActions"></div>
      </div>
    </div>
    ${isTV ? `<div id="episodePicker" style="display:none">
      <div class="picker-row"><label>Season</label><select id="seasonSel"></select></div>
      <div class="ep-list" id="epList"></div>
    </div>` : ""}
    ${d.cast && d.cast.length ? `
      <div class="section-label" style="margin-top:1.8rem;font-size:1.3rem">🎭 <span>Cast</span></div>
      <div class="cast-strip">${d.cast.map(p=>`
        <div class="cast-card">
          ${p.photo ? `<img class="cast-photo" src="${p.photo}" alt="${esc(p.name)}" loading="lazy" />`
                    : `<div class="cast-photo" style="display:flex;align-items:center;justify-content:center;font-size:1.5rem">👤</div>`}
          <div class="cast-name">${esc(p.name)}</div>
          <div class="cast-char">${esc(p.character)}</div>
        </div>`).join("")}
      </div>` : ""}`;

  $("detailClose").addEventListener("click", closeDetail);

  const actions = $("dActions");
  if (isTV) {
    const wb = document.createElement("button");
    wb.className = "btn btn-red"; wb.innerHTML = "▶ Watch";
    wb.addEventListener("click", () => {
      const picker = $("episodePicker");
      picker.style.display = picker.style.display === "none" ? "block" : "none";
      if (picker.style.display === "block") {
        const ss = $("seasonSel"); ss.innerHTML = "";
        for (let i = 1; i <= (d.number_of_seasons || 1); i++) {
          const o = document.createElement("option"); o.value = i; o.textContent = `Season ${i}`; ss.appendChild(o);
        }
        ss.addEventListener("change", () => loadEpList(d.tmdbId, parseInt(ss.value)));
        loadEpList(d.tmdbId, 1);
      }
    });
    actions.appendChild(wb);
  } else {
    const wb = document.createElement("button");
    wb.className = "btn btn-red"; wb.innerHTML = "▶ Watch Movie";
    wb.addEventListener("click", () => openPlayer(`https://www.vidking.net/embed/movie/${d.tmdbId}`, d.title, false, d));
    actions.appendChild(wb);
  }

  if (d.trailer_key) {
    const tb = document.createElement("button");
    tb.className = "btn btn-ghost"; tb.innerHTML = "▶ Trailer";
    tb.addEventListener("click", () => window.open(`https://www.youtube.com/watch?v=${d.trailer_key}`, "_blank", "noopener"));
    actions.appendChild(tb);
  }

  setTimeout(() => $("detailClose").focus(), 80);
}

async function loadEpList(tmdbId, season) {
  const el = $("epList");
  el.innerHTML = `<div class="spinner"></div>`;
  try {
    const r = await fetch(`/api/tv/${tmdbId}/season/${season}`);
    const d = await r.json();
    el.innerHTML = "";
    (d.episodes || []).forEach(ep => {
      const item = document.createElement("div");
      item.className = "ep-item"; item.tabIndex = 0;
      item.innerHTML = `
        <div class="ep-num">${ep.episode_number}</div>
        <div class="ep-info"><div class="ep-name">${esc(ep.name)}</div><div class="ep-date">${ep.air_date || ""}${ep.runtime ? ` · ${ep.runtime}m` : ""}</div></div>
        ${ep.still ? `<img class="ep-still" src="${ep.still}" alt="" loading="lazy" />` : ""}`;
      item.addEventListener("click", () => {
        openPlayer(`https://www.vidking.net/embed/tv/${tmdbId}/${season}/${ep.episode_number}`,
          `${S.detail.title} — S${season}E${ep.episode_number}`, true, S.detail, season, ep.episode_number);
      });
      item.addEventListener("keydown", e => { if (e.key === "Enter") item.click(); });
      el.appendChild(item);
    });
  } catch { el.innerHTML = `<p style="color:var(--muted);padding:1rem">Could not load episodes.</p>`; }
}

function closeDetail() {
  detailPanel.classList.remove("open");
  document.body.style.overflow = "";
  $("detailBg").src = "";
}

// ── Player ────────────────────────────────────────────────────────────────────
let redirectGuard = null;

function openPlayer(src, title, isTV, detail, season = 1, episode = 1) {
  S.playerSrc = src; S.playerActive = true;
  detailPanel.classList.remove("open");
  document.body.style.overflow = "hidden";
  playerTitle.textContent = title;
  playerPanel.classList.add("open");

  if (isTV && detail) {
    playerEpNav.style.display = "flex";
    playerSeason.innerHTML = "";
    for (let i = 1; i <= (detail.number_of_seasons || 1); i++) {
      const o = document.createElement("option"); o.value = i; o.textContent = `S${i}`;
      if (i === season) o.selected = true;
      playerSeason.appendChild(o);
    }
    loadPlayerEps(detail.tmdbId, season, episode);
    playerSeason.onchange = () => loadPlayerEps(detail.tmdbId, parseInt(playerSeason.value), 1);
    playerLoad.onclick = () => {
      const s = parseInt(playerSeason.value), e = parseInt(playerEp.value);
      const newSrc = `https://www.vidking.net/embed/tv/${detail.tmdbId}/${s}/${e}`;
      playerTitle.textContent = `${detail.title} — S${s}E${e}`;
      loadFrame(newSrc);
    };
  } else {
    playerEpNav.style.display = "none";
  }

  loadFrame(src);
  setTimeout(() => playerBack.focus(), 80);
}

async function loadPlayerEps(tmdbId, season, selectedEp) {
  playerEp.innerHTML = "<option>Loading…</option>";
  try {
    const r = await fetch(`/api/tv/${tmdbId}/season/${season}`);
    const d = await r.json();
    playerEp.innerHTML = "";
    (d.episodes || []).forEach(ep => {
      const o = document.createElement("option"); o.value = ep.episode_number;
      o.textContent = `E${ep.episode_number}: ${ep.name.substring(0, 28)}`;
      if (ep.episode_number === selectedEp) o.selected = true;
      playerEp.appendChild(o);
    });
  } catch { playerEp.innerHTML = `<option value="${selectedEp}">Episode ${selectedEp}</option>`; }
}

function loadFrame(src) {
  S.playerSrc = src;
  if (redirectGuard) { clearInterval(redirectGuard); redirectGuard = null; }
  vidFrame.src = src;
  redirectGuard = setInterval(() => {
    if (!S.playerActive) { clearInterval(redirectGuard); return; }
    try { if (vidFrame.src !== S.playerSrc) vidFrame.src = S.playerSrc; } catch (_) {}
  }, 500);
}

window.addEventListener("beforeunload", e => {
  if (S.playerActive) { e.preventDefault(); e.returnValue = ""; setTimeout(() => { vidFrame.src = S.playerSrc; }, 100); }
});

function closePlayer() {
  S.playerActive = false;
  playerPanel.classList.remove("open");
  document.body.style.overflow = "";
  if (redirectGuard) { clearInterval(redirectGuard); redirectGuard = null; }
  vidFrame.src = "about:blank";
}

playerBack.addEventListener("click", closePlayer);

// ── Keyboard navigation ───────────────────────────────────────────────────────
document.addEventListener("keydown", e => {
  if (S.playerActive) {
    if (e.key === "Escape") { e.preventDefault(); closePlayer(); }
    return;
  }
  if (detailPanel.classList.contains("open")) {
    if (e.key === "Escape" || e.key === "Backspace") { e.preventDefault(); closeDetail(); }
    else if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"].includes(e.key)) {
      e.preventDefault();
      modalMove(e.key.replace("Arrow", "").toLowerCase());
    }
    return;
  }
  if (e.key === "h" || e.key === "H") { e.preventDefault(); goHome(); return; }
  if (e.key === "Escape" || e.key === "Backspace") { e.preventDefault(); focusSearch(); return; }
  if (["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].includes(e.key)) { e.preventDefault(); keyboardGridNav(e.key); return; }
  if (e.key === "Enter" && S.focusedCard) { S.focusedCard.click(); return; }
  if (e.key.length === 1 && !e.ctrlKey && !e.metaKey) searchInput.focus();
});

function focusSearch() { searchInput.focus(); searchInput.select(); }

function keyboardGridNav(key) {
  const activeGrid = resultsSection.style.display !== "none" ? resultsGrid : trendingGrid;
  const cards = Array.from(activeGrid.querySelectorAll(".card"));
  if (!cards.length) return;
  let idx = S.focusedCard ? cards.indexOf(S.focusedCard) : -1;
  if (idx < 0) { cards[0].focus(); return; }
  const cols = Math.round(activeGrid.offsetWidth / cards[0].offsetWidth);
  let next = idx;
  if (key === "ArrowRight") next = idx + 1;
  if (key === "ArrowLeft")  next = idx - 1;
  if (key === "ArrowDown")  next = idx + cols;
  if (key === "ArrowUp")    next = idx - cols;
  if (next >= 0 && next < cards.length) { cards[next].focus(); S.focusedCard = cards[next]; }
}

function activateFocused() { if (S.focusedCard) S.focusedCard.click(); }
function gridMove(delta, axis) {
  const activeGrid = resultsSection.style.display !== "none" ? resultsGrid : trendingGrid;
  const cards = Array.from(activeGrid.querySelectorAll(".card"));
  if (!cards.length) return;
  let idx = S.focusedCard ? cards.indexOf(S.focusedCard) : -1;
  if (idx < 0) { cards[0].focus(); S.focusedCard = cards[0]; return; }
  const cols = Math.round(activeGrid.offsetWidth / (cards[0].offsetWidth || 1));
  let next = idx + (axis === "row" ? delta * cols : delta);
  if (next >= 0 && next < cards.length) { cards[next].focus(); S.focusedCard = cards[next]; }
}

// ── Init ──────────────────────────────────────────────────────────────────────
loadTrending();
</script>
</body>
</html>
